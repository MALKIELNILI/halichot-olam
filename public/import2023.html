function mergeInto(key, newItems, refField) {
  const existing = JSON.parse(localStorage.getItem(key) || '[]');
  const existingRefs = new Set(existing.map(x => x[refField] || x.bankRef).filter(Boolean));
  const toAdd = newItems.filter(x => !x.bankRef || !existingRefs.has(x.bankRef));
  const merged = [...existing, ...toAdd];
  localStorage.setItem(key, JSON.stringify(merged));
  return toAdd.length;
}

function doImport() {
  const d = mergeInto('halichot_olam_donations', donations, 'bankRef');
  const e = mergeInto('halichot_olam_expenses',  expenses,  'bankRef');

  document.getElementById('done').style.display = 'block';
}
