<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a2744"/>
  <rect width="512" height="512" rx="80" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1e3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- decorative line top -->
  <rect x="60" y="110" width="392" height="3" rx="2" fill="#c9a84c" opacity="0.6"/>
  <!-- decorative line bottom -->
  <rect x="60" y="399" width="392" height="3" rx="2" fill="#c9a84c" opacity="0.6"/>
  <!-- תפארת -->
  <text x="256" y="235" font-family="Arial, sans-serif" font-size="118" font-weight="bold"
    fill="#e8c97e" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">תפארת</text>
  <!-- מישאל -->
  <text x="256" y="360" font-family="Arial, sans-serif" font-size="118" font-weight="bold"
    fill="#c9a84c" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">מישאל</text>
</svg>
