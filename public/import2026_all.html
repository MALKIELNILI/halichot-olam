function mergeInto(key, items) {
  const existing = JSON.parse(localStorage.getItem(key) || '[]');
  const refs = new Set(existing.map(x => x.bankRef).filter(Boolean));
  const toAdd = items.filter(x => !x.bankRef || !refs.has(x.bankRef));
  localStorage.setItem(key, JSON.stringify([...existing, ...toAdd]));
  return toAdd.length;
}
function doImport() {
  const d = mergeInto('halichot_olam_donations', donations);
  const e = mergeInto('halichot_olam_expenses',  expenses);
  document.getElementById('done').textContent = `✅ יובאו ${d} תרומות ו-${e} הוצאות. חזור לאפליקציה ורענן.`;
  document.getElementById('done').style.display = 'block';
}
// Compute opening balance dynamically from imported data + known last balance
window.addEventListener('load', () => {
  const totalDon = donations.reduce((s, x) => s + parseFloat(x.amount||0), 0);
  const totalExp = expenses.reduce((s, x) => s + parseFloat(x.amount||0), 0);
  const net = totalDon - totalExp;
  const lastBal = 10434.04;
  const opening = lastBal - net;
  document.getElementById('ob_display').textContent = opening.toLocaleString('he-IL', {minimumFractionDigits:0, maximumFractionDigits:0}) + ' ₪';
});
